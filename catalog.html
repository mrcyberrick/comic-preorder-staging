<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalog — Pull List</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Search + filter toggle row — always visible */
    .toolbar-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .toolbar-header .search-wrap { flex: 1 1 auto; }

    /* FOC-locked reserve button — distinct from both reserved (red) and normal (grey) */
    .btn-reserve.foc-locked,
    .btn-reserve.foc-locked:disabled {
      background: transparent !important;
      border: 1px solid var(--border) !important;
      color: var(--text-muted) !important;
      cursor: not-allowed !important;
      opacity: 0.7 !important;
      font-size: 0.72rem !important;
      letter-spacing: 0.02em;
    }
    .btn-reserve.foc-locked:hover { opacity: 0.7 !important; }

    /* Desktop: filter toggle hidden, panel always shown as normal toolbar */
    @media (min-width: 641px) {
      #btn-filter-toggle { display: none !important; }
      #filter-panel      { display: flex !important; }
    }

    /* Mobile: toggle shown, panel hidden until opened */
    @media (max-width: 640px) {
      #btn-filter-toggle { display: flex !important; }
      #filter-panel {
        display: none;
        flex-direction: column;
        gap: 8px;
        background: var(--bg-card, #1a1a1a);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px;
        margin-bottom: 12px;
      }
      #filter-panel.open { display: flex; }
      #filter-panel .filter-select,
      #filter-panel #btn-pin-filters {
        width: 100%;
        box-sizing: border-box;
      }
      #filter-panel #btn-pin-filters { text-align: left; }
    }
  </style>
</head>
<body>

<!-- Navigation -->
<nav class="nav" id="main-nav">
  <div class="container nav-inner">
    <a href="catalog.html" class="nav-logo">PULL<span>LIST</span></a>
    <button class="nav-hamburger" id="nav-hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links">
      <li><a href="catalog.html">Catalog</a></li>
      <li><a href="mylist.html">My List</a></li>
      <li><a href="subscriptions.html">Subscriptions</a></li>
      <li><a href="arrivals.html" id="nav-arrivals-link">This Week</a></li>
      <li id="nav-admin" style="display:none"><a href="admin.html">Admin</a></li>
      <li id="nav-analytics" style="display:none"><a href="analytics.html">Analytics</a></li>
    </ul>
    <div class="nav-user">
      <span>Welcome, <strong id="nav-username"></strong></span>
      <button class="btn-logout" id="btn-logout">Sign Out</button>
    </div>
  </div>
</nav>

<!-- Page Header -->
<div class="container">
  <div class="page-header">
    <h1>Monthly Catalog</h1>
    <p id="catalog-subtitle">Browse and reserve items from the current order cycle</p>
  </div>

  <!-- Order Deadline Banner — populated and shown by JS after FOC date is fetched -->
  <div id="deadline-banner" class="deadline-banner" style="display:none" role="status" aria-live="polite"></div>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total Items</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:var(--lunar)" id="stat-lunar">—</div>
      <div class="stat-label">Lunar</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:var(--prh)" id="stat-prh">—</div>
      <div class="stat-label">PRH</div>
    </div>
    <div class="stat">
      <div class="stat-value" style="color:var(--accent)" id="stat-reserved">—</div>
      <div class="stat-label">My Reservations</div>
    </div>
  </div>

  <!-- Toolbar: search always visible; filters collapse on mobile -->
  <div class="toolbar-header">
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="search" placeholder="Search titles, series, writers, UPC, ISBN, item code…">
    </div>
    <button id="btn-filter-toggle" aria-expanded="false" aria-controls="filter-panel"
      style="display:none;align-items:center;gap:7px;background:var(--bg-elevated);
             border:1px solid var(--border);border-radius:var(--radius);padding:8px 13px;
             color:var(--text-primary);font-size:0.85rem;font-weight:500;cursor:pointer;
             white-space:nowrap;flex-shrink:0;transition:border-color 0.15s">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/>
      </svg>
      Filters
      <span id="filter-active-count" style="display:none;background:var(--accent);color:#fff;
            font-size:0.65rem;font-weight:700;padding:1px 6px;border-radius:8px;line-height:1.6"></span>
    </button>
  </div>

  <div class="toolbar" id="filter-panel">
    <select class="filter-select" id="filter-distributor">
      <option value="">All Distributors</option>
      <option value="Lunar">Lunar</option>
      <option value="PRH">PRH</option>
    </select>
    <select class="filter-select" id="filter-publisher">
      <option value="">All Publishers</option>
    </select>
    <select class="filter-select" id="filter-reserved">
      <option value="">All Items</option>
      <option value="foc-this-month">⏰ FOC Expiring This Month</option>
      <option value="recommended">Recommended For You</option>
      <option value="reserved">Reserved Only</option>
      <option value="unreserved">Not Yet Reserved</option>
    </select>
    <select class="filter-select" id="filter-variants">
      <option value="standard">Standard Covers</option>
      <option value="">All Covers</option>
    </select>
    <!-- Admin only: shown after init if user is admin -->
    <select class="filter-select" id="admin-user-select" style="display:none;border-color:var(--accent);color:var(--accent)">
      <option value="">&#9881; Manage customer…</option>
    </select>
    <button id="btn-pin-filters" title="Pin these filters so they reload on your next visit"
      style="background:none;border:1px solid var(--border);border-radius:var(--radius);
             padding:6px 10px;cursor:pointer;color:var(--text-muted);font-size:0.8rem;
             white-space:nowrap;transition:color 0.15s,border-color 0.15s;flex-shrink:0">
      📌 Pin filters
    </button>
  </div>

  <!-- Results count -->
  <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:16px" id="results-count"></div>

  <!-- Catalog Grid -->
  <div id="catalog-grid" class="catalog-grid"></div>

  <!-- Pagination -->
  <div class="pagination" id="pagination" style="display:none"></div>
</div>

<!-- Comic Detail Modal -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-cover">
        <img id="modal-cover-img" src="" alt="">
      </div>
      <div class="modal-title-block">
        <h2 id="modal-title"></h2>
        <div class="modal-series" id="modal-series"></div>
        <div class="modal-badges" id="modal-badges"></div>
        <div class="modal-price-row">
          <span class="modal-price" id="modal-price"></span>
          <span class="modal-dates" id="modal-dates"></span>
        </div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-credits" id="modal-credits"></div>
      <h3>Description</h3>
      <p id="modal-description"></p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modal-close">Close</button>
      <button class="btn btn-ghost" id="modal-subscribe" style="display:none">☆ Subscribe</button>
      <div class="qty-stepper" id="modal-qty-wrap">
        <button class="qty-btn" id="qty-minus">−</button>
        <input type="number" id="modal-qty" value="1" min="1" max="99"
          style="width:44px;text-align:center;background:var(--bg-elevated);border:1px solid var(--border);
                 color:var(--text-primary);font-size:0.9rem;padding:4px;border-radius:var(--radius);">
        <button class="qty-btn" id="qty-plus">+</button>
      </div>
      <button class="btn btn-primary" id="modal-reserve">+ Reserve</button>
    </div>
  </div>
</div>

<footer class="site-footer">
  Service provided by Ray &amp; Judy's Book Stop &middot; Rockaway, NJ
</footer>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
<script>
(async () => {
  await TenantContext.resolve();
  const navData = await initNav();
  if (!navData) return;
  const { user, profile } = navData;

  // Check maintenance mode — admins bypass
  try { await checkMaintenanceMode(profile?.is_admin); } catch(e) { return; }

  // Block non-admins during maintenance
  try { await checkMaintenanceMode(profile?.is_admin); }
  catch(e) { if (e.message === 'maintenance') return; }

  // ── Pending account detection ────────────────────────────────
  // Pending users can browse but cannot reserve or subscribe.
  // Admins are never treated as pending regardless of their status field.
  const isPending = !profile?.is_admin && profile?.status === 'pending';
  if (isPending) {
    // Inject the pending banner below the page header
    const header = document.querySelector('.page-header');
    if (header) {
      const banner = document.createElement('div');
      banner.id = 'pending-banner';
      banner.style.cssText = [
        'background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.35);',
        'border-radius:var(--radius);padding:14px 18px;margin-bottom:20px;',
        'display:flex;align-items:flex-start;gap:12px;',
      ].join('');
      banner.innerHTML =
        '<div style="font-size:1.1rem;line-height:1;margin-top:2px">&#128274;</div>' +
        '<div>' +
          '<div style="font-weight:700;font-size:0.88rem;color:var(--warning,#eab308);margin-bottom:4px">' +
            'Your account is being reviewed' +
          '</div>' +
          '<div style="font-size:0.82rem;color:var(--text-secondary);line-height:1.6">' +
            'You can browse the upcoming catalog while we confirm your details. ' +
            'Reservations will be available once Ray\u0026nbsp;&amp;\u0026nbsp;Judy\u2019s Book Stop approves your account. ' +
            'Questions? Call us at (973)\u0026nbsp;586-9182.' +
          '</div>' +
        '</div>';
      header.insertAdjacentElement('afterend', banner);
    }
  }

  // ── Welcome modal — first-time users only ─────────────────────
  // Non-blocking; runs after page init. Skipped for pending users
  // (they see the pending banner which already orients them).
  if (!isPending) {
    WelcomeModal.show(user.id, profile);
  }

  const PAGE_SIZE = 50;
  let currentPage = 1;
  let currentMonth = null;
  let reservedIds = new Set();
  let currentMonthQty = 0;  // reserved qty scoped to current catalog month only
  let mySubscriptions = new Set(); // Set of "series_name||distributor" keys
  let allItems = [];
  let totalCount = 0;
  let modalComicId = null;

  // Fetches the total reserved quantity for the current catalog month only.
  // Runs once on init (and on admin context switch) to populate currentMonthQty.
  async function loadCurrentMonthQty(userId) {
    if (!currentMonth) return 0;
    const { data } = await db
      .from('preorders')
      .select('quantity, catalog!inner(catalog_month)')
      .eq('user_id', userId)
      .eq('catalog.catalog_month', currentMonth);
    return (data || []).reduce((s, r) => s + (r.quantity || 1), 0);
  }

  // ── Elements ──────────────────────────────────────────────
  const grid        = document.getElementById('catalog-grid');
  const searchEl    = document.getElementById('search');
  const distEl      = document.getElementById('filter-distributor');
  const pubEl       = document.getElementById('filter-publisher');
  const resEl       = document.getElementById('filter-reserved');
  const variantEl   = document.getElementById('filter-variants');
  const countEl     = document.getElementById('results-count');
  const paginEl     = document.getElementById('pagination');
  const overlay     = document.getElementById('modal-overlay');

  // ── Pinned Filter Persistence ─────────────────────────────
  // Saves/restores distributor, publisher, reserved-view, and variant filters
  // to localStorage, keyed per user so customers don't share state.
  // Search text is intentionally excluded — pins are for structural preferences.
  const PIN_KEY = `pulllist_pinned_filters_${user.id}`;
  const pinBtn  = document.getElementById('btn-pin-filters');

  function getPinnedFilters() {
    try { return JSON.parse(localStorage.getItem(PIN_KEY)); } catch { return null; }
  }

  function savePinnedFilters() {
    const state = {
      distributor: distEl.value,
      publisher:   pubEl.value,
      reserved:    resEl.value,
      variants:    variantEl.value,
    };
    localStorage.setItem(PIN_KEY, JSON.stringify(state));
    updatePinBtn(true);
  }

  function clearPinnedFilters() {
    localStorage.removeItem(PIN_KEY);
    updatePinBtn(false);
  }

  function updatePinBtn(isPinned) {
    if (isPinned) {
      pinBtn.textContent = '📌 Pinned';
      pinBtn.style.color = 'var(--accent, #e85d4a)';
      pinBtn.style.borderColor = 'var(--accent, #e85d4a)';
      pinBtn.title = 'Filters pinned — click to unpin and reset to defaults';
    } else {
      pinBtn.textContent = '📌 Pin filters';
      pinBtn.style.color = 'var(--text-muted)';
      pinBtn.style.borderColor = 'var(--border)';
      pinBtn.title = 'Pin these filters so they reload on your next visit';
    }
  }

  pinBtn.addEventListener('click', () => {
    if (getPinnedFilters()) {
      clearPinnedFilters();
      // Reset to defaults
      distEl.value    = '';
      pubEl.value     = '';
      resEl.value     = '';
      variantEl.value = 'standard';
      searchEl.value  = '';
      loadCatalog(1);
    } else {
      savePinnedFilters();
    }
  });

  // Re-save whenever a filter changes (keeps the pin current)
  function maybeResavePin() {
    if (getPinnedFilters()) savePinnedFilters();
  }

  // ── Init ──────────────────────────────────────────────────
  // Restore pinned filters if present; otherwise reset to defaults.
  const pinned = getPinnedFilters();
  if (pinned) {
    distEl.value    = pinned.distributor ?? '';
    pubEl.value     = pinned.publisher   ?? '';
    resEl.value     = pinned.reserved    ?? '';
    variantEl.value = pinned.variants    ?? 'standard';
    searchEl.value  = '';
    updatePinBtn(true);
  } else {
    distEl.value    = '';
    pubEl.value     = '';
    resEl.value     = '';
    variantEl.value = 'standard'; // default: hide variants
    searchEl.value  = '';
    updatePinBtn(false);
  }

  // Helper: standard cover test used for client-side variant filtering
  function isStandardCover(item) {
    const vt = item.variant_type;
    return !vt || vt === 'Standard' || vt === 'Primary Title';
  }

  currentMonth = await Catalog.getLatestMonth();
  if (currentMonth) {
    document.getElementById('catalog-subtitle').textContent =
      `Catalog for ${currentMonth} — browse and reserve items`;
  }

  // ── Order deadline banner ─────────────────────────────────────
  // Reads the admin-set order_deadline from settings.
  // Shown only while the deadline has not yet passed — hides itself automatically.
  if (currentMonth) {
    Settings.getOrderDeadline().then(deadline => {
      if (!deadline) return;
      const now = new Date();
      const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      if (deadline < todayStr) return; // past deadline — stay hidden

      const [dy, dm, dd] = deadline.split('-').map(Number);
      const deadlineDate = new Date(dy, dm - 1, dd);
      const formatted = deadlineDate.toLocaleDateString('en-US', { month: 'long', day: 'numeric' });

      const [my, mm] = currentMonth.split('-');
      const monthLabel = new Date(parseInt(my), parseInt(mm) - 1, 1)
        .toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const banner = document.getElementById('deadline-banner');
      banner.innerHTML =
        '<span style="font-size:1rem;flex-shrink:0">⏰</span>' +
        '<span>Reserve by <strong>' + formatted + '</strong> to lock in your ' + monthLabel + ' picks.' +
        ' <span class="foc-label foc-label--below" data-tooltip="Final Order Cutoff — the date the shop must submit your order to the distributor">What\'s this?</span>' +
        '</span>';
      banner.style.display = 'flex';
    });
  }

  // ── Admin user switcher ───────────────────────────────────
  const adminSelectEl = document.getElementById('admin-user-select');
  if (profile?.is_admin) {
    adminSelectEl.style.display = '';
    // Load all customer profiles for the dropdown
    const { data: allProfiles } = await db
      .from('user_profiles')
      .select('id, full_name')
      .eq('is_admin', false)
      .order('full_name');
    (allProfiles || []).forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id;
      opt.textContent = p.full_name;
      adminSelectEl.appendChild(opt);
    });

    // Restore dropdown selection if context was set on another page
    if (AdminContext.isActive()) {
      adminSelectEl.value = AdminContext.activeUserId;
    }

    adminSelectEl.addEventListener('change', async () => {
      const selectedId   = adminSelectEl.value;
      const selectedName = adminSelectEl.options[adminSelectEl.selectedIndex].text;
      if (selectedId) {
        AdminContext.set(selectedId, selectedName);
      } else {
        AdminContext.clear();
      }
      // Reload reservations for the newly selected user
      reservedIds = await Preorders.getMyIds(AdminContext.resolveUserId(user.id));
      currentMonthQty = await loadCurrentMonthQty(AdminContext.resolveUserId(user.id));
      document.getElementById('stat-reserved').textContent = currentMonthQty;
      await loadCatalog(1);
    });
  }

  reservedIds = await Preorders.getMyIds(AdminContext.resolveUserId(user.id));
  currentMonthQty = await loadCurrentMonthQty(AdminContext.resolveUserId(user.id));
  document.getElementById('stat-reserved').textContent = currentMonthQty;

  // Load subscriptions for subscribe button state
  const { items: subItems } = await Subscriptions.getAll(user.id);
  mySubscriptions = new Set(subItems.map(s => `${s.series_name}||${s.distributor}`));

  // Load publishers for filter
  if (currentMonth) {
    const publishers = await Catalog.getPublishers(currentMonth);
    publishers.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      pubEl.appendChild(opt);
    });
    // Restore pinned publisher now that options exist
    if (pinned?.publisher) pubEl.value = pinned.publisher;
  }

  await loadCatalog();

  // ── Load + Render ─────────────────────────────────────────
  async function loadCatalog(page = 1) {
    renderSkeletons(10, grid);
    currentPage = page;

    const reserveFilter = resEl.value;

    // ── FOC Expiring This Month ───────────────────────────────
    // Fetches the full catalog for the month (respecting distributor/publisher/search
    // and variant filters), then client-side filters to items where foc_date falls
    // within the current calendar month. Sorted by foc_date ascending so the most
    // urgent deadlines appear first. Uses the same two-batch count-first approach as
    // the reserved/unreserved path to avoid Supabase 416 errors.
    if (reserveFilter === 'foc-this-month') {
      const buildFilters = (q) => {
        if (currentMonth) q = q.eq('catalog_month', currentMonth);
        if (distEl.value) q = q.eq('distributor', distEl.value);
        if (pubEl.value)  q = q.eq('publisher', pubEl.value);
        const s = searchEl.value.trim();
        if (s) q = q.or(`title.ilike.%${s}%,series_name.ilike.%${s}%,writer.ilike.%${s}%,publisher.ilike.%${s}%,upc.ilike.%${s}%,isbn.ilike.%${s}%,item_code.ilike.%${s}%`);
        return q;
      };

      const countRes = await buildFilters(
        db.from('catalog').select('*', { count: 'exact', head: true })
      );
      if (countRes.error) {
        grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">Failed to load catalog: ${escapeHtml(countRes.error.message || JSON.stringify(countRes.error))}</div>`;
        return;
      }
      const total = countRes.count ?? 0;

      let items = [];
      if (total > 0) {
        const buildQuery = (from, to) =>
          buildFilters(db.from('catalog').select('*'))
            .order('foc_date', { ascending: true })
            .order('title',    { ascending: true })
            .range(from, to);

        const batch1 = await buildQuery(0, Math.min(999, total - 1));
        if (batch1.error) {
          grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">Failed to load catalog: ${escapeHtml(batch1.error.message)}</div>`;
          return;
        }
        items = batch1.data || [];

        if (total > 1000) {
          const batch2 = await buildQuery(1000, Math.min(1999, total - 1));
          if (!batch2.error) items = [...items, ...(batch2.data || [])];
        }
      }

      // Client-side: keep only items whose FOC date is this calendar month,
      // then apply the variant filter on top.
      const hideVariants = variantEl.value === 'standard';
      const filtered = items
        .filter(i => isFocThisMonth(i.foc_date))
        .filter(i => !hideVariants || isStandardCover(i));

      const filteredTotal = filtered.length;
      const pageFrom  = (page - 1) * PAGE_SIZE;
      const displayed = filtered.slice(pageFrom, pageFrom + PAGE_SIZE);

      allItems   = items;
      totalCount = total;
      document.getElementById('stat-total').textContent = total;

      if (!filteredTotal) {
        // Compute current month label for the empty state message
        const now = new Date();
        const emptyMonthLabel = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
            </svg>
            <h3>No FOC deadlines this month</h3>
            <p>No items in the current catalog have a Final Order Cutoff in ${emptyMonthLabel}.</p>
          </div>`;
        paginEl.style.display = 'none';
        countEl.textContent = '';
        return;
      }

      // Build a short label like "April 2026" for the count line
      const now = new Date();
      const focMonthLabel = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      countEl.textContent = `Showing ${displayed.length} of ${filteredTotal} items with FOC in ${focMonthLabel}`;

      grid.innerHTML = displayed.map(c => buildComicCard(c, reservedIds.get(c.id) || 0)).join('');
      renderPagination(filteredTotal, page);
      attachGridEvents();
      return;
    }

    // ── Recommended For You path ──────────────────────────────
    // Ranks the current month's catalog by relevance to this user:
    // personalized series first (from their history), then by overall popularity.
    // Only fetches lightweight id+series fields for ranking, then fetches full
    // records for the current page only — no 1900-row full-data fetch needed.
    if (reserveFilter === 'recommended') {
      const targetUserId = AdminContext.resolveUserId(user.id);
      const { items: rankedItems, hasPersonal } =
        await Recommendations.getCatalogIds(targetUserId, currentMonth);

      if (!rankedItems.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H9l4-8v4h2l-4 8z"/>
            </svg>
            <h3>No recommendations yet</h3>
            <p>Reserve some items and check back next month for personalized picks</p>
          </div>`;
        paginEl.style.display = 'none';
        countEl.textContent = '';
        return;
      }

      // Apply variant filter to the FULL ranked list BEFORE paginating.
      // Filtering after slicing caused short pages and empty grid cells.
      const hideVariants = variantEl.value === 'standard';
      const filteredItems = hideVariants
        ? rankedItems.filter(i => isStandardCover(i))
        : rankedItems;

      const filteredTotal = filteredItems.length;
      const pageFrom      = (page - 1) * PAGE_SIZE;
      const pageSlice     = filteredItems.slice(pageFrom, pageFrom + PAGE_SIZE);
      const pageIds       = pageSlice.map(i => i.id);

      if (!pageIds.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H9l4-8v4h2l-4 8z"/>
            </svg>
            <h3>No items found</h3>
            <p>Try adjusting your search or filters</p>
          </div>`;
        paginEl.style.display = 'none';
        countEl.textContent = '';
        return;
      }

      // Fetch full catalog records for only this page's IDs
      const { data: pageData, error: pageError } = await db
        .from('catalog')
        .select('*')
        .in('id', pageIds);

      if (pageError) {
        grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">Failed to load recommendations: ${escapeHtml(pageError.message)}</div>`;
        return;
      }

      // Reorder fetched rows to match recommendation rank (`.in()` doesn't preserve order)
      const itemById     = new Map((pageData || []).map(i => [i.id, i]));
      const orderedItems = pageIds.map(id => itemById.get(id)).filter(Boolean);

      allItems = orderedItems; // modal lookup only needs the current page

      const label = hasPersonal ? 'recommended' : 'popular';
      countEl.textContent = `Showing ${Math.min(pageIds.length, filteredTotal - pageFrom)} of ${filteredTotal} ${label} items` +
        (hideVariants ? ' (standard covers)' : '');

      grid.innerHTML = orderedItems.map(c => buildComicCard(c, reservedIds.get(c.id) || 0)).join('');
      renderPagination(filteredTotal, page);
      attachGridEvents();
      return;
    }

    // ── FIX: When filtering by reserved/unreserved, we must fetch ALL matching
    // items across the full catalog — not just the current page — because
    // reservedIds is a client-side Set and pagination would hide results on
    // other pages. We bypass server-side paging and fetch in two batches of
    // 1000 (Supabase silently caps any single request at 1000 rows, so a
    // single pageSize:2000 call only ever returns the first 1000 items,
    // which meant PRH items — sorted after Lunar — were always missing).
    if (reserveFilter === 'reserved' || reserveFilter === 'unreserved') {
      // Step 1: Get total count first (head request — no rows returned)
      // This tells us how many rows to expect before we fetch, avoiding
      // 416 errors from .range() on small or empty result sets.
      const buildFilters = (q) => {
        if (currentMonth)    q = q.eq('catalog_month', currentMonth);
        if (distEl.value)    q = q.eq('distributor', distEl.value);
        if (pubEl.value)     q = q.eq('publisher', pubEl.value);
        const s = searchEl.value.trim();
        if (s) q = q.or(`title.ilike.%${s}%,series_name.ilike.%${s}%,writer.ilike.%${s}%,publisher.ilike.%${s}%,upc.ilike.%${s}%,isbn.ilike.%${s}%,item_code.ilike.%${s}%`);
        return q;
      };

      const countRes = await buildFilters(
        db.from('catalog').select('*', { count: 'exact', head: true })
      );
      if (countRes.error) {
        grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">Failed to load catalog: ${escapeHtml(countRes.error.message || JSON.stringify(countRes.error))}</div>`;
        return;
      }
      const total = countRes.count ?? 0;

      // Step 2: Fetch rows only if we know they exist
      let items = [];
      if (total > 0) {
        const buildQuery = (from, to) =>
          buildFilters(db.from('catalog').select('*'))
            .order('publisher',    { ascending: true })
            .order('series_name',  { ascending: true })
            .order('title',        { ascending: true })
            .range(from, to);

        const batch1 = await buildQuery(0, Math.min(999, total - 1));
        if (batch1.error) {
          grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">Failed to load catalog: ${escapeHtml(batch1.error.message || JSON.stringify(batch1.error))}</div>`;
          return;
        }
        items = batch1.data || [];

        if (total > 1000) {
          const batch2 = await buildQuery(1000, Math.min(1999, total - 1));
          if (batch2.error) {
            grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">Failed to load catalog: ${escapeHtml(batch2.error.message || JSON.stringify(batch2.error))}</div>`;
            return;
          }
          items = [...items, ...(batch2.data || [])];
        }
      }

      // Apply client-side variant + reserved filters across ALL items
      const hideVariants = variantEl.value === 'standard';
      const filtered = (reserveFilter === 'reserved'
        ? items.filter(i => reservedIds.has(i.id))
        : items.filter(i => !reservedIds.has(i.id))
      ).filter(i => !hideVariants || isStandardCover(i));

      // Now paginate the filtered result ourselves
      const filteredTotal = filtered.length;
      const pageFrom = (page - 1) * PAGE_SIZE;
      const displayed = filtered.slice(pageFrom, pageFrom + PAGE_SIZE);

      allItems   = items; // keep full set so modal can find any item
      totalCount = total;

      document.getElementById('stat-total').textContent = total;

      countEl.textContent = `Showing ${Math.min(displayed.length, filteredTotal)} of ${filteredTotal} ${reserveFilter === 'reserved' ? 'reserved' : 'unreserved'} items`;

      if (!displayed.length) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column:1/-1">
            <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H9l4-8v4h2l-4 8z"/>
            </svg>
            <h3>No items found</h3>
            <p>Try adjusting your search or filters</p>
          </div>`;
        paginEl.style.display = 'none';
        return;
      }

      grid.innerHTML = displayed.map(c => buildComicCard(c, reservedIds.get(c.id) || 0, isFocLocked(c.foc_date))).join('');
      renderPagination(filteredTotal, page);
      attachGridEvents();
      return;
    }

    // ── Standard paginated path (no reserved filter active) ──
    const filters = {
      month:        currentMonth,
      distributor:  distEl.value,
      publisher:    pubEl.value,
      search:       searchEl.value.trim(),
      hideVariants: variantEl.value === 'standard',
      page,
      pageSize:     PAGE_SIZE,
    };

    const { items, total, error } = await Catalog.fetch(filters);

    if (error) {
      grid.innerHTML = `<div class="alert alert-error" style="grid-column:1/-1">Failed to load catalog: ${error.message}</div>`;
      return;
    }

    allItems   = items;
    totalCount = total;

    // Stats — query full counts across entire catalog month, not just current page
    document.getElementById('stat-total').textContent = total;
    if (page === 1 && !distEl.value && !pubEl.value && !searchEl.value.trim()) {
      // Only fetch full distributor counts when no filters are active
      const [lunarCount, prhCount] = await Promise.all([
        db.from('catalog').select('id', { count: 'exact', head: true })
          .eq('catalog_month', currentMonth).eq('distributor', 'Lunar'),
        db.from('catalog').select('id', { count: 'exact', head: true })
          .eq('catalog_month', currentMonth).eq('distributor', 'PRH'),
      ]);
      document.getElementById('stat-lunar').textContent = lunarCount.count ?? 0;
      document.getElementById('stat-prh').textContent   = prhCount.count  ?? 0;
    }

    countEl.textContent = `Showing ${items.length} of ${total} items`;

    if (!items.length) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15v-4H9l4-8v4h2l-4 8z"/>
          </svg>
          <h3>No items found</h3>
          <p>Try adjusting your search or filters</p>
        </div>`;
      paginEl.style.display = 'none';
      return;
    }

    grid.innerHTML = items.map(c => buildComicCard(c, reservedIds.get(c.id) || 0, isFocLocked(c.foc_date))).join('');
    renderPagination(total, page);
    attachGridEvents();
  }

  // ── Attach card event listeners (shared by both render paths) ─
  function attachGridEvents() {
    // Fade in images once loaded
    grid.querySelectorAll('img').forEach(img => {
      if (img.complete) {
        img.classList.add('loaded');
      } else {
        img.addEventListener('load', () => img.classList.add('loaded'));
        img.addEventListener('error', () => img.classList.add('loaded'));
      }
    });

    // ── FOC lock enforcement pass ────────────────────────────
    // Runs before the click-handler loop so locks are applied regardless
    // of whether app.js was served fresh or from browser cache.
    // Any .btn-reserve whose catalog item has a past FOC date is disabled here.
    grid.querySelectorAll('.btn-reserve').forEach(btn => {
      const comic = allItems.find(c => c.id === btn.dataset.id);
      if (comic && isFocLocked(comic.foc_date)) {
        btn.disabled    = true;
        btn.textContent = '\uD83D\uDD12 FOC Locked';
        btn.classList.add('foc-locked');
        btn.classList.remove('reserved');
        btn.title = 'Order cutoff has passed — contact the store to inquire';
      }
    });

    // Card click → modal
    grid.querySelectorAll('.comic-cover, .comic-info').forEach(el => {
      el.addEventListener('click', () => {
        const id = el.closest('.comic-card').dataset.id;
        openModal(id);
      });
    });

    // Reserve button
    grid.querySelectorAll('.btn-reserve').forEach(btn => {
      if (isPending) {
        // Pending users see a locked button — no action, visual cue only
        btn.disabled = true;
        btn.title = 'Available once your account is approved';
        btn.style.opacity = '0.45';
        btn.style.cursor  = 'not-allowed';
        btn.textContent   = '\uD83D\uDD12 Pending';
        return;
      }
      // FOC-locked items have disabled=true set in the HTML template — skip them.
      // Disabled buttons block native click events, but we skip explicitly for safety.
      if (btn.disabled) return;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const comic = allItems.find(c => c.id === btn.dataset.id) || null;
        toggleReserve(btn.dataset.id, btn, 1, comic);
      });
    });
  }

  // ── Pagination ────────────────────────────────────────────
  function renderPagination(total, page) {
    const pages = Math.ceil(total / PAGE_SIZE);
    if (pages <= 1) { paginEl.style.display = 'none'; return; }
    paginEl.style.display = 'flex';

    let html = `<button class="page-btn" ${page===1?'disabled':''} data-page="${page-1}">‹</button>`;
    for (let i = 1; i <= pages; i++) {
      if (pages > 7 && i > 2 && i < pages - 1 && Math.abs(i - page) > 1) {
        if (i === 3 || i === pages - 2) html += `<span class="page-info">…</span>`;
        continue;
      }
      html += `<button class="page-btn ${i===page?'active':''}" data-page="${i}">${i}</button>`;
    }
    html += `<button class="page-btn" ${page===pages?'disabled':''} data-page="${page+1}">›</button>`;
    paginEl.innerHTML = html;

    paginEl.querySelectorAll('.page-btn:not(:disabled)').forEach(btn => {
      btn.addEventListener('click', () => {
        loadCatalog(parseInt(btn.dataset.page));
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
    });
  }

  // ── Reserve Toggle ────────────────────────────────────────
  // comic is the full catalog row — passed directly from the call site so
  // logging metadata is always available regardless of which page is loaded.
  async function toggleReserve(catalogId, btn, quantity = 1, comic = null) {
    // Hard guard — never allow reserve or cancel on FOC-locked items.
    // Defense-in-depth: this fires even if a disabled button somehow triggers a click.
    // comicObj is declared once here and reused throughout the function.
    const comicObj = comic || allItems.find(c => c.id === catalogId) || null;
    if (isFocLocked(comicObj && comicObj.foc_date)) return;
    const isReserved = reservedIds.has(catalogId);
    const targetUserId = AdminContext.resolveUserId(user.id);
    btn.disabled = true;

    if (isReserved) {
      const { error } = await Preorders.cancel(targetUserId, catalogId);
      if (error) { toast('Failed to cancel reservation', 'error'); }
      else {
        const oldQty = reservedIds.get(catalogId) || 1;
        reservedIds.delete(catalogId);
        currentMonthQty -= oldQty;
        btn.textContent = '+ Reserve';
        btn.classList.remove('reserved');
        const badge = btn.closest('.comic-card')?.querySelector('.reserved-indicator');
        if (badge) badge.remove();
        toast('Reservation cancelled');
        updateReservedStat();
        UsageEvents.cancel(user.id, comicObj);
      }
    } else {
      const { error } = await Preorders.reserve(targetUserId, catalogId, quantity);
      if (error) {
        toast(error.code === '23505' ? 'Already reserved' : 'Failed to reserve', 'error');
      } else {
        reservedIds.set(catalogId, quantity);
        currentMonthQty += quantity;
        btn.textContent = '✓ Reserved';
        btn.classList.add('reserved');
        const cover = btn.closest('.comic-card')?.querySelector('.comic-cover');
        if (cover && !cover.querySelector('.reserved-indicator')) {
          const badge = document.createElement('div');
          badge.className = 'reserved-indicator';
          badge.textContent = 'Qty: ' + quantity;
          cover.appendChild(badge);
        }
        toast('Reserved! Please pick up and pay when it arrives in store.');
        updateReservedStat();
        UsageEvents.reserve(user.id, comicObj);
      }
    }

    btn.disabled = false;

    // Sync modal if open
    if (modalComicId === catalogId) {
      const modalBtn = document.getElementById('modal-reserve');
      if (modalBtn) {
        modalBtn.textContent = reservedIds.has(catalogId) ? '✓ Cancel Reservation' : '+ Reserve';
      }
    }
  }

  function updateReservedStat() {
    document.getElementById('stat-reserved').textContent = currentMonthQty;
    // Update subtitle to reflect whose list we're managing
    const subtitle = document.getElementById('catalog-subtitle');
    if (AdminContext.isActive()) {
      subtitle.innerHTML = `Catalog for ${currentMonth} &mdash; managing <strong style="color:var(--accent)">${escapeHtml(AdminContext.activeUserName)}</strong>`;
    } else {
      subtitle.textContent = `Catalog for ${currentMonth} — browse and reserve items`;
    }
  }

  // ── Modal ─────────────────────────────────────────────────
  function openModal(catalogId) {
    const comic = allItems.find(c => c.id === catalogId);
    if (!comic) return;
    modalComicId = catalogId;

    const isReserved = reservedIds.has(catalogId);
    const coverImg = document.getElementById('modal-cover-img');
    coverImg.classList.remove('loaded');
    coverImg.src = comic.cover_url || COVER_PLACEHOLDER;
    coverImg.alt = comic.title;
    coverImg.onerror = function() { this.src = COVER_PLACEHOLDER; this.onerror = null; this.classList.add('loaded'); };
    coverImg.onload  = function() { this.classList.add('loaded'); };
    coverImg.parentElement.style.display = '';

    document.getElementById('modal-title').textContent   = comic.title || '';
    document.getElementById('modal-series').textContent  =
      [comic.series_name, comic.publisher].filter(Boolean).join(' · ');
    document.getElementById('modal-price').textContent   = formatPrice(comic.price_usd);
    document.getElementById('modal-description').textContent = comic.description || 'No description available.';

    const datesParts = [];
    if (comic.foc_date) {
      const focPast   = isFocPast(comic.foc_date);
      const focLocked = isFocLocked(comic.foc_date);
      const focColor  = focPast ? 'color:var(--accent)' : '';
      const focNote   = focLocked
        ? ' <span style="color:var(--accent);font-size:0.8em;font-weight:400">(order window closed)</span>'
        : '';
      datesParts.push(
        `<span style="${focColor}">` +
        `<span class="foc-label" data-tooltip="Final Order Cutoff — the date the shop must submit your order">FOC ?</span>` +
        ` ${formatDate(comic.foc_date)}${focNote}` +
        `</span>`
      );
    }
    if (comic.on_sale_date) {
      datesParts.push(`On Sale: ${formatDate(comic.on_sale_date)}`);
    }
    document.getElementById('modal-dates').innerHTML = datesParts.join('  ·  ');

    // Badges
    const badgesEl = document.getElementById('modal-badges');
    badgesEl.innerHTML = [
      comic.distributor ? `<span class="badge badge-${comic.distributor.toLowerCase()}">${comic.distributor}</span>` : '',
      comic.format      ? `<span class="badge badge-format">${escapeHtml(comic.format)}</span>` : '',
      comic.variant_type && comic.variant_type !== 'Standard'
        ? `<span class="badge badge-variant">${escapeHtml(comic.variant_type)}</span>` : '',
    ].join('');

    // Credits
    const credits = [
      ['Writer',       comic.writer],
      ['Artist',       comic.artist],
      ['Cover Artist', comic.cover_artist],
    ].filter(([,v]) => v);
    document.getElementById('modal-credits').innerHTML = credits.map(([label, val]) => `
      <div class="modal-credit-item">
        <label>${label}</label>
        <span>${escapeHtml(val)}</span>
      </div>
    `).join('');

    // ── Quantity stepper setup ──────────────────────────────
    const qtyInput  = document.getElementById('modal-qty');
    const qtyWrap   = document.getElementById('modal-qty-wrap');
    const currentQty = reservedIds.get(catalogId) || 1;
    qtyInput.value = currentQty;

    // Hide stepper if already reserved (show cancel instead)
    qtyWrap.style.display = isReserved ? 'none' : 'flex';

    document.getElementById('qty-minus').onclick = () => {
      const v = parseInt(qtyInput.value) || 1;
      if (v > 1) qtyInput.value = v - 1;
    };
    document.getElementById('qty-plus').onclick = () => {
      const v = parseInt(qtyInput.value) || 1;
      if (v < 99) qtyInput.value = v + 1;
    };

    const reserveBtn = document.getElementById('modal-reserve');
    const focLocked  = isFocLocked(comic.foc_date);

    if (isPending) {
      reserveBtn.textContent = '\uD83D\uDD12 Approval pending';
      reserveBtn.className   = 'btn btn-ghost';
      reserveBtn.disabled    = true;
      reserveBtn.style.opacity = '0.5';
      reserveBtn.onclick     = null;
    } else if (focLocked && !isReserved) {
      // FOC passed, not reserved — cannot reserve
      reserveBtn.textContent   = '\uD83D\uDD12 FOC Locked';
      reserveBtn.className     = 'btn btn-ghost';
      reserveBtn.disabled      = true;
      reserveBtn.style.opacity = '0.55';
      reserveBtn.title         = 'Order cutoff has passed — contact the store to inquire';
      reserveBtn.onclick       = null;
    } else if (focLocked && isReserved) {
      // FOC passed, already reserved — committed, cannot cancel
      reserveBtn.textContent   = '\u2713 Reserved (FOC Passed)';
      reserveBtn.className     = 'btn btn-ghost reserved';
      reserveBtn.disabled      = true;
      reserveBtn.style.opacity = '0.75';
      reserveBtn.title         = 'Order cutoff has passed — this reservation is committed';
      reserveBtn.onclick       = null;
    } else {
      reserveBtn.textContent = isReserved ? '\u2715 Cancel Reservation' : '+ Reserve';
      reserveBtn.className   = isReserved ? 'btn btn-danger' : 'btn btn-primary';
      reserveBtn.disabled    = false;
      reserveBtn.style.opacity = '';
      reserveBtn.title       = '';
    }
    if (!isPending && !focLocked) {
      reserveBtn.onclick = () => {
        const qty     = parseInt(qtyInput.value) || 1;
        const cardBtn = grid.querySelector(`.btn-reserve[data-id="${catalogId}"]`);
        toggleReserve(catalogId, reserveBtn, qty, comic);
        if (cardBtn) {
          setTimeout(() => {
            const nowReserved = reservedIds.has(catalogId);
            cardBtn.textContent = nowReserved ? '\u2713 Reserved' : '+ Reserve';
            cardBtn.classList.toggle('reserved', nowReserved);
          }, 300);
        }
      };
    }

    // ── Subscribe button ───────────────────────────────────
    const subscribeBtn = document.getElementById('modal-subscribe');
    const isStandardCoverItem = !comic.variant_type || comic.variant_type === 'Standard' || comic.variant_type === 'Primary Title';
    if (comic.series_name && !AdminContext.isActive() && isStandardCoverItem && !isPending) {
      const subKey = `${comic.series_name}||${comic.distributor}`;
      const isSubscribed = mySubscriptions.has(subKey);
      subscribeBtn.style.display = '';
      subscribeBtn.textContent = isSubscribed ? '★ Subscribed' : '☆ Subscribe';
      subscribeBtn.className   = isSubscribed ? 'btn btn-ghost subscribed' : 'btn btn-ghost';
      subscribeBtn.onclick = async () => {
        subscribeBtn.disabled = true;
        if (mySubscriptions.has(subKey)) {
          const { error } = await Subscriptions.unsubscribe(user.id, comic.series_name, comic.distributor);
          if (error) { toast('Failed to unsubscribe', 'error'); }
          else {
            mySubscriptions.delete(subKey);
            subscribeBtn.textContent = '☆ Subscribe';
            subscribeBtn.className   = 'btn btn-ghost';
            toast(`Unsubscribed from ${comic.series_name}`);
          }
        } else {
          const { error } = await Subscriptions.subscribe(user.id, comic.series_name, comic.distributor, comic.format || null);
          if (error) { toast('Failed to subscribe', 'error'); }
          else {
            mySubscriptions.add(subKey);
            subscribeBtn.textContent = '★ Subscribed';
            subscribeBtn.className   = 'btn btn-ghost subscribed';
            toast(`Subscribed to ${comic.series_name}!`);
          }
        }
        subscribeBtn.disabled = false;
      };
    } else {
      subscribeBtn.style.display = 'none';
    }

    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
    modalComicId = null;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });


  // Show analytics nav link for admins
  if (profile?.is_admin) {
    const navAnalytics = document.getElementById('nav-analytics');
    if (navAnalytics) navAnalytics.style.display = 'block';
  }

  // Log catalog page view — real customers only, not admins or pending accounts
  if (!profile?.is_admin && !isPending && !AdminContext.isActive()) {
    UsageEvents.catalogView(user.id, { catalogMonth: currentMonth });
  }

  // ── Filter Events ─────────────────────────────────────────
  const debouncedLoad = debounce(() => loadCatalog(1), 350);
  searchEl.addEventListener('input', debouncedLoad);
  distEl.addEventListener('change',    () => { maybeResavePin(); syncFilterBadge(); loadCatalog(1); });
  pubEl.addEventListener('change',     () => { maybeResavePin(); syncFilterBadge(); loadCatalog(1); });
  resEl.addEventListener('change',     () => { maybeResavePin(); syncFilterBadge(); loadCatalog(1); });
  variantEl.addEventListener('change', () => { maybeResavePin(); syncFilterBadge(); loadCatalog(1); });

  // ── Mobile filter toggle ──────────────────────────────────
  const filterToggleBtn = document.getElementById('btn-filter-toggle');
  const filterPanel     = document.getElementById('filter-panel');
  const filterBadge     = document.getElementById('filter-active-count');

  function syncFilterBadge() {
    const active = [
      distEl.value !== '',
      pubEl.value  !== '',
      // foc-this-month counts as an active filter just like reserved/unreserved
      resEl.value  !== '',
      variantEl.value !== 'standard',
    ].filter(Boolean).length;

    if (active > 0) {
      filterBadge.textContent   = active;
      filterBadge.style.display = 'inline';
      filterToggleBtn.style.borderColor = 'var(--accent)';
    } else {
      filterBadge.style.display = 'none';
      filterToggleBtn.style.borderColor = 'var(--border)';
    }
  }

  filterToggleBtn.addEventListener('click', () => {
    const isOpen = filterPanel.classList.toggle('open');
    filterToggleBtn.setAttribute('aria-expanded', String(isOpen));
  });

  // Reflect any restored pinned state in the badge on load
  syncFilterBadge();

})();
</script>
</body>
</html>
