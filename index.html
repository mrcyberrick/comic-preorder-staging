<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pull List — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">PULL<span>LIST</span></div>
    <div class="login-tagline">Monthly Comic Pre-Orders</div>

    <h2>Sign in to your account</h2>

    <div id="login-error" class="alert alert-error" style="display:none"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button id="btn-login" class="btn btn-primary btn-full" style="margin-top:8px">
      Sign In
    </button>

    <p style="margin-top:20px; font-size:0.78rem; color:var(--text-muted); text-align:center; line-height:1.6">
      Don't have an account? Contact the shop and<br>we'll get you set up.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
<script>
(async () => {
  // Redirect if already logged in
  const session = await Auth.getSession();
  if (session) {
    window.location.href = 'catalog.html';
    return;
  }

  const emailEl    = document.getElementById('email');
  const passwordEl = document.getElementById('password');
  const btnLogin   = document.getElementById('btn-login');
  const errorEl    = document.getElementById('login-error');

  async function doLogin() {
    const email    = emailEl.value.trim();
    const password = passwordEl.value;

    if (!email || !password) {
      errorEl.textContent = 'Please enter your email and password.';
      errorEl.style.display = 'block';
      return;
    }

    btnLogin.disabled     = true;
    btnLogin.textContent  = 'Signing in…';
    errorEl.style.display = 'none';

    const { error } = await Auth.signIn(email, password);

    if (error) {
      errorEl.textContent   = 'Invalid email or password. Please try again.';
      errorEl.style.display = 'block';
      btnLogin.disabled     = false;
      btnLogin.textContent  = 'Sign In';
    } else {
      window.location.href = 'catalog.html';
    }
  }

  btnLogin.addEventListener('click', doLogin);
  passwordEl.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') passwordEl.focus(); });
})();
</script>

</body>
</html>
