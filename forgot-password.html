<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Pull List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">PULL<span>LIST</span></div>
    <div class="login-tagline">Monthly Comic Pre-Orders</div>

    <!-- Step 1: Request reset -->
    <div id="step-request">
      <h2>Reset your password</h2>
      <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;line-height:1.6">
        Enter the email address on your account and we'll send you a reset link.
      </p>

      <div id="request-error" class="alert alert-error" style="display:none"></div>
      <div id="request-success" class="alert alert-info" style="display:none"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <button id="btn-send" class="btn btn-primary btn-full" style="margin-top:8px">
        Send Reset Link
      </button>

      <p style="margin-top:20px;text-align:center">
        <a href="index.html" style="font-size:0.82rem;color:var(--text-muted);text-decoration:underline">
          Back to sign in
        </a>
      </p>
    </div>

    <!-- Step 2: Set new password (shown when arriving from reset email link) -->
    <div id="step-newpassword" style="display:none">
      <h2>Choose a new password</h2>
      <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;line-height:1.6">
        Enter a new password for your account.
      </p>

      <div id="newpw-error" class="alert alert-error" style="display:none"></div>

      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="At least 8 characters" autocomplete="new-password">
        <div id="fp-strength-meter"></div>
      </div>

      <div class="form-group">
        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your new password" autocomplete="new-password">
      </div>

      <button id="btn-update" class="btn btn-primary btn-full" style="margin-top:8px">
        Update Password
      </button>
    </div>

    <!-- Step 3: Success -->
    <div id="step-done" style="display:none">
      <div style="text-align:center;padding:16px 0">
        <div style="font-size:2.5rem;margin-bottom:12px">✓</div>
        <h2 style="margin-bottom:8px">Password updated</h2>
        <p style="font-size:0.82rem;color:var(--text-muted);margin-bottom:24px">
          Your password has been changed successfully.
        </p>
        <a href="catalog.html" class="btn btn-primary">Go to Catalog</a>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="app.js"></script>
<script>
(async () => {

  // ── Detect if we arrived here from a reset email link ────────
  // Supabase appends #access_token=...&type=recovery to the URL
  const hash   = window.location.hash;
  const params = new URLSearchParams(hash.replace('#', '?'));
  const type   = params.get('type');

  if (type === 'recovery') {
    // Exchange the token for an active session before showing the form
    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token') || '';

    const { error: sessionErr } = await db.auth.setSession({
      access_token:  accessToken,
      refresh_token: refreshToken,
    });

    if (sessionErr) {
      // Token expired — send them back to request a new one
      document.getElementById('step-request').style.display = 'block';
      const errorEl = document.getElementById('request-error');
      errorEl.textContent   = 'Your reset link has expired. Please request a new one below.';
      errorEl.style.display = 'block';
      setupRequestForm();
    } else {
      document.getElementById('step-request').style.display    = 'none';
      document.getElementById('step-newpassword').style.display = 'block';
      setupNewPasswordForm();
    }
    // Clean up the hash from the URL
    history.replaceState(null, '', window.location.pathname);
  } else {
    setupRequestForm();
  }

  // ── Request reset email ───────────────────────────────────────
  function setupRequestForm() {
    const emailEl   = document.getElementById('email');
    const btnSend   = document.getElementById('btn-send');
    const errorEl   = document.getElementById('request-error');
    const successEl = document.getElementById('request-success');

    // Build the redirect URL — points back to this same page
    const resetRedirectUrl = window.location.origin + window.location.pathname;

    async function sendReset() {
      const email = emailEl.value.trim();
      if (!email) {
        errorEl.textContent   = 'Please enter your email address.';
        errorEl.style.display = 'block';
        return;
      }

      btnSend.disabled    = true;
      btnSend.textContent = 'Sending…';
      errorEl.style.display   = 'none';
      successEl.style.display = 'none';

      const { error } = await db.auth.resetPasswordForEmail(email, {
        redirectTo: resetRedirectUrl,
      });

      if (error) {
        const msg = error.message?.toLowerCase() || '';
        if (msg.includes('rate') || msg.includes('limit') || msg.includes('too many') || error.status === 429) {
          errorEl.textContent   = 'Too many reset requests — please wait a few minutes before trying again.';
        } else {
          errorEl.textContent   = 'Something went wrong. Please try again in a moment.';
        }
        errorEl.style.display = 'block';
        btnSend.disabled      = false;
        btnSend.textContent   = 'Send Reset Link';
        return;
      }

      // Always show success message — avoids leaking whether email exists
      successEl.innerHTML = `
        Reset link sent! Check your inbox at <strong>${escapeHtml(email)}</strong>
        and click the link to choose a new password.
        <br><br>
        <span style="font-size:0.78rem;opacity:0.7">
          Didn't get it? Check your spam folder, or
          <a href="#" id="resend-link" style="color:inherit;text-decoration:underline">send again</a>.
        </span>
      `;
      successEl.style.display = 'block';
      btnSend.style.display   = 'none';
      emailEl.disabled        = true;

      document.getElementById('resend-link')?.addEventListener('click', e => {
        e.preventDefault();
        btnSend.style.display   = 'block';
        btnSend.disabled        = false;
        btnSend.textContent     = 'Send Reset Link';
        emailEl.disabled        = false;
        successEl.style.display = 'none';
      });
    }

    btnSend.addEventListener('click', sendReset);
    emailEl.addEventListener('keydown', e => { if (e.key === 'Enter') sendReset(); });
  }


  // ── Password strength validation ──────────────────────────
  function validatePassword(pwd) {
    const rules = [
      { re: /.{8,}/,          msg: 'At least 8 characters' },
      { re: /[A-Z]/,          msg: 'At least one uppercase letter' },
      { re: /[0-9]/,          msg: 'At least one number' },
      { re: /[^A-Za-z0-9]/,  msg: 'At least one special character (!@#$%^&* etc.)' },
    ];
    const failed = rules.filter(r => !r.re.test(pwd));
    return failed;
  }

  function renderStrength(pwd, containerId) {
    const container = document.getElementById(containerId);
    if (!container) return;
    if (!pwd) { container.innerHTML = ''; return; }

    const rules = [
      { re: /.{8,}/,         label: '8+ characters' },
      { re: /[A-Z]/,         label: 'Uppercase' },
      { re: /[0-9]/,         label: 'Number' },
      { re: /[^A-Za-z0-9]/, label: 'Special character' },
    ];
    const passed = rules.filter(function(r){ return r.re.test(pwd); }).length;
    const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
    const labels = ['Weak','Fair','Good','Strong'];
    const color  = colors[passed - 1] || '#ef4444';
    const label  = labels[passed - 1] || '';

    var bars = '';
    rules.forEach(function(r) {
      var bg = r.re.test(pwd) ? color : 'var(--border)';
      bars += '<div style="flex:1;height:3px;border-radius:2px;background:' + bg + ';transition:background 0.2s"></div>';
    });

    var missing = '';
    rules.forEach(function(r) {
      if (!r.re.test(pwd)) {
        missing += '<div style="font-size:0.71rem;color:var(--text-muted);margin-top:2px">\u2717 ' + r.label + '</div>';
      }
    });

    var opacity = passed === 4 ? '' : 'opacity:0.8;';
    container.innerHTML = '<div style="margin-top:6px">'
      + '<div style="display:flex;gap:3px;margin-bottom:4px">' + bars + '</div>'
      + '<div style="font-size:0.72rem;color:' + color + ';' + opacity + '">' + label + '</div>'
      + missing
      + '</div>';
  }

  // ── Set new password ──────────────────────────────────────────
  function setupNewPasswordForm() {
    const newPwEl   = document.getElementById('new-password');
    const confPwEl  = document.getElementById('confirm-password');
    const btnUpdate = document.getElementById('btn-update');
    const errorEl   = document.getElementById('newpw-error');

    newPwEl.addEventListener('input', () => renderStrength(newPwEl.value, 'fp-strength-meter'));

    async function updatePassword() {
      const password = newPwEl.value;
      const confirm  = confPwEl.value;

      errorEl.style.display = 'none';

      const failed = validatePassword(password);
      if (failed.length > 0) {
        errorEl.textContent   = 'Password must have: ' + failed.map(f => f.msg).join(', ') + '.';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errorEl.textContent   = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      btnUpdate.disabled    = true;
      btnUpdate.textContent = 'Updating…';

      const { error } = await db.auth.updateUser({ password });

      if (error) {
        errorEl.textContent   = 'Failed to update password. The reset link may have expired — please request a new one.';
        errorEl.style.display = 'block';
        btnUpdate.disabled    = false;
        btnUpdate.textContent = 'Update Password';
      } else {
        document.getElementById('step-newpassword').style.display = 'none';
        document.getElementById('step-done').style.display        = 'block';
      }
    }

    btnUpdate.addEventListener('click', updatePassword);
    confPwEl.addEventListener('keydown', e => { if (e.key === 'Enter') updatePassword(); });
  }

})();
</script>

</body>
</html>
